<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      .box { fill: #f8f9fa; stroke: #343a40; stroke-width: 2; rx: 8; }
      .text-title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #212529; text-anchor: middle; }
      .text-desc { font-family: Arial, sans-serif; font-size: 14px; fill: #495057; text-anchor: middle; }
      .arrow { stroke: #3178c6; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .ts-box { fill: #e0f0ff; stroke: #3178c6; stroke-width: 2; rx: 8; }
      .js-box { fill: #fff9c4; stroke: #f7df1e; stroke-width: 2; rx: 8; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3178c6" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="50" class="text-title" style="font-size: 24px;">How TypeScript Works</text>

  <!-- TypeScript Code -->
  <rect x="100" y="150" width="180" height="100" class="ts-box" />
  <text x="190" y="190" class="text-title" style="fill: #3178c6;">TypeScript</text>
  <text x="190" y="215" class="text-desc">app.ts</text>
  <text x="190" y="235" class="text-desc">(Has Types & Errors)</text>

  <!-- Compiler -->
  <rect x="350" y="165" width="100" height="70" class="box" />
  <text x="400" y="195" class="text-title">Compiler</text>
  <text x="400" y="215" class="text-desc">(tsc)</text>

  <!-- JavaScript Code -->
  <rect x="520" y="150" width="180" height="100" class="js-box" />
  <text x="610" y="190" class="text-title" style="fill: #bfa600;">JavaScript</text>
  <text x="610" y="215" class="text-desc">app.js</text>
  <text x="610" y="235" class="text-desc">(Runs in Browser/Node)</text>

  <!-- Arrows -->
  <path d="M 280 200 L 340 200" class="arrow" />
  <path d="M 450 200 L 510 200" class="arrow" />

  <!-- Note -->
  <text x="400" y="320" class="text-desc" style="font-style: italic;">Browsers and Node.js cannot run TypeScript directly.</text>
  <text x="400" y="340" class="text-desc" style="font-style: italic;">It must be compiled (transpiled) into plain JavaScript first.</text>
</svg>