<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="100%" height="100%">
  <defs>
    <style>
      .bg     { fill: #1e1e2e; }
      .box-l  { fill: #2d2d3f; stroke: #475569; stroke-width: 2; }
      .box-r  { fill: #2d2d3f; stroke: #10b981; stroke-width: 2; }
      .inner  { fill: #181825; }
      .t-main { font-family: sans-serif; font-size: 14px; text-anchor: middle; fill: #f8fafc; }
      .t-code { font-family: monospace; font-size: 13px; fill: #a5b4fc; }
      .t-res  { font-family: monospace; font-size: 13px; fill: #6ee7b7; }
      .t-cmt  { font-family: monospace; font-size: 11px; fill: #64748b; }
      .t-lbl  { font-family: sans-serif; font-size: 11px; fill: #64748b; text-anchor: middle; }
      .eq     { font-family: sans-serif; font-size: 28px; fill: #10b981; text-anchor: middle; }
      .hl     { fill: none; stroke: #fcd34d; stroke-width: 1.5; stroke-dasharray: 3,2; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="400" y="26" class="t-main" font-size="18" font-weight="bold">List Comprehension — ပိုတိုသော နည်းလမ်း</text>

  <!-- Left: Traditional for loop -->
  <rect x="20" y="44" width="340" height="240" rx="8" class="box-l"/>
  <text x="190" y="68" class="t-main" fill="#94a3b8">အဟောင်း — For Loop</text>

  <rect x="36" y="80" width="308" height="188" rx="4" class="inner"/>
  <text x="48" y="104" class="t-code" fill="#64748b"># ၁: Empty list ဖန်တီး</text>
  <text x="48" y="124" class="t-code">squares = []</text>
  <text x="48" y="154" class="t-code" fill="#64748b"># ၂: Loop ပတ်</text>
  <text x="48" y="174" class="t-code">for x in range(5):</text>
  <text x="48" y="204" class="t-code" fill="#64748b">    # ၃: တွက်ပြီး ထည့်</text>
  <text x="48" y="224" class="t-code">    squares.append(x**2)</text>
  <text x="48" y="254" class="t-res">→ [0, 1, 4, 9, 16]</text>
  <text x="190" y="296" class="t-lbl">ကြောင်း ၄ ကြောင်း လိုသည်</text>

  <!-- Equal sign -->
  <text x="400" y="178" class="eq">≡</text>
  <text x="400" y="206" class="t-lbl">တူညီသောအဖြေ</text>

  <!-- Right: Comprehension -->
  <rect x="440" y="44" width="340" height="240" rx="8" class="box-r"/>
  <text x="610" y="68" class="t-main" fill="#6ee7b7">အသစ် — Comprehension</text>

  <rect x="456" y="80" width="308" height="188" rx="4" class="inner"/>
  <text x="468" y="118" class="t-code" fill="#64748b"># တစ်ကြောင်းတည်းနဲ့ ပြီးသည်</text>
  <text x="468" y="150" class="t-code">squares = [</text>
  <text x="468" y="174" class="t-code" fill="#fcd34d">    x**2</text>
  <text x="468" y="198" class="t-code" fill="#c4b5fd">    for x in range(5)</text>
  <text x="468" y="222" class="t-code">]</text>
  <text x="468" y="254" class="t-res">→ [0, 1, 4, 9, 16]</text>
  <text x="610" y="296" class="t-lbl">ကြောင်း ၃ (သို့) ၁ ကြောင်းတည်း</text>

  <!-- Annotation brackets -->
  <rect x="552" y="136" width="62" height="22" rx="3" class="hl"/>
  <rect x="552" y="160" width="148" height="22" rx="3" class="hl"/>
  <text x="728" y="150" class="t-cmt" fill="#fcd34d">expression</text>
  <text x="728" y="174" class="t-cmt" fill="#c4b5fd">iterable</text>

  <!-- Conditional comprehension row -->
  <rect x="20" y="300" width="760" height="46" rx="6" class="inner"/>
  <text x="36" y="320" class="t-code" fill="#94a3b8"># Condition ပါ comprehension:</text>
  <text x="36" y="338" class="t-code">evens = [x <text/></text>
  <text x="110" y="338" class="t-code" fill="#fcd34d">for x in range(10)</text>
  <text x="290" y="338" class="t-code" fill="#10b981"> if x % 2 == 0</text>
  <text x="450" y="338" class="t-code">]</text>
  <text x="490" y="338" class="t-res">→ [0, 2, 4, 6, 8]</text>
  <text x="650" y="338" class="t-cmt" fill="#64748b">စုံဂဏန်းများသာ</text>
</svg>
