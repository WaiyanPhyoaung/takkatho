<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#f8fafc" rx="8"/>
    
    <text x="400" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">Local vs Global Optimum</text>
    
    <path d="M 100 300 Q 200 150 300 250 T 500 100 T 700 350" stroke="#334155" stroke-width="4" fill="none" />
    
    <circle cx="200" cy="150" r="10" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
    <text x="200" y="120" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ef4444" text-anchor="middle" dominant-baseline="middle">Local Optimum</text>
    <text x="200" y="100" font-family="system-ui, sans-serif" font-size="12" font-weight="normal" fill="#ef4444" text-anchor="middle" dominant-baseline="middle">(Greedy stops here)</text>
    
    <circle cx="500" cy="100" r="10" fill="#22c55e" stroke="#22c55e" stroke-width="2"/>
    <text x="500" y="70" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#22c55e" text-anchor="middle" dominant-baseline="middle">Global Optimum</text>
    <text x="500" y="50" font-family="system-ui, sans-serif" font-size="12" font-weight="normal" fill="#22c55e" text-anchor="middle" dominant-baseline="middle">(Best possible solution)</text>

    </svg>