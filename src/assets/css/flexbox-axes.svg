<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" font-family="monospace">
  <rect width="680" height="380" fill="#1e1e2e"/>

  <text x="340" y="36" fill="#e2e8f0" font-size="20" font-weight="bold" text-anchor="middle">Flexbox Axes — Main Axis နဲ့ Cross Axis</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f472b6"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7dd3fc"/>
    </marker>
  </defs>

  <!-- ROW panel -->
  <text x="170" y="80" fill="#a78bfa" font-size="15" font-weight="bold" text-anchor="middle">flex-direction: row</text>
  <rect x="45" y="100" width="250" height="150" rx="8" fill="#252536" stroke="#475569" stroke-width="1"/>
  <!-- items -->
  <rect x="70" y="140" width="55" height="70" rx="5" fill="#2d2d3f" stroke="#7c3aed" stroke-width="2"/>
  <rect x="140" y="140" width="55" height="70" rx="5" fill="#2d2d3f" stroke="#7c3aed" stroke-width="2"/>
  <rect x="210" y="140" width="55" height="70" rx="5" fill="#2d2d3f" stroke="#7c3aed" stroke-width="2"/>
  <!-- main axis (horizontal) -->
  <line x1="60" y1="230" x2="280" y2="230" stroke="#f472b6" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="170" y="248" fill="#f472b6" font-size="12" text-anchor="middle">Main Axis</text>
  <!-- cross axis (vertical) -->
  <line x1="315" y1="110" x2="315" y2="240" stroke="#7dd3fc" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <text x="330" y="180" fill="#7dd3fc" font-size="12" transform="rotate(90 330 180)" text-anchor="middle">Cross Axis</text>

  <!-- COLUMN panel -->
  <text x="500" y="80" fill="#a78bfa" font-size="15" font-weight="bold" text-anchor="middle">flex-direction: column</text>
  <rect x="420" y="100" width="160" height="200" rx="8" fill="#252536" stroke="#475569" stroke-width="1"/>
  <!-- items stacked -->
  <rect x="455" y="115" width="90" height="42" rx="5" fill="#2d2d3f" stroke="#7c3aed" stroke-width="2"/>
  <rect x="455" y="167" width="90" height="42" rx="5" fill="#2d2d3f" stroke="#7c3aed" stroke-width="2"/>
  <rect x="455" y="219" width="90" height="42" rx="5" fill="#2d2d3f" stroke="#7c3aed" stroke-width="2"/>
  <!-- main axis (vertical) -->
  <line x1="600" y1="110" x2="600" y2="290" stroke="#f472b6" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="618" y="200" fill="#f472b6" font-size="12" transform="rotate(90 618 200)" text-anchor="middle">Main Axis</text>
  <!-- cross axis (horizontal) -->
  <line x1="430" y1="285" x2="565" y2="285" stroke="#7dd3fc" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <text x="500" y="303" fill="#7dd3fc" font-size="12" text-anchor="middle">Cross Axis</text>

  <!-- footer note -->
  <text x="340" y="355" fill="#94a3b8" font-size="13" text-anchor="middle">flex-direction ပြောင်းရင် Main Axis လည်း လိုက်ပြောင်းတယ် — justify-content က Main၊ align-items က Cross</text>
</svg>
