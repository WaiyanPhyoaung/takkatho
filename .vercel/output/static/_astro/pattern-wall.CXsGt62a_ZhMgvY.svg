<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#f8fafc" rx="8"/>
    
    <text x="400" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">Common DSA Patterns</text>
    
    <rect x="150" y="100" width="200" height="100" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="8"/>
    <text x="250" y="140" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#3b82f6" text-anchor="middle" dominant-baseline="middle">Two Pointers</text>
    <text x="250" y="170" font-family="system-ui, sans-serif" font-size="16" font-weight="normal" fill="#64748b" text-anchor="middle" dominant-baseline="middle">-&gt; [ ... ] &lt;-</text>
    
    <rect x="450" y="100" width="200" height="100" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="8"/>
    <text x="550" y="140" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#3b82f6" text-anchor="middle" dominant-baseline="middle">Sliding Window</text>
    <text x="550" y="170" font-family="system-ui, sans-serif" font-size="16" font-weight="normal" fill="#64748b" text-anchor="middle" dominant-baseline="middle">[ -&gt; ] -&gt;</text>
    
    <rect x="150" y="230" width="200" height="100" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="8"/>
    <text x="250" y="270" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#3b82f6" text-anchor="middle" dominant-baseline="middle">BFS / DFS</text>
    <text x="250" y="300" font-family="system-ui, sans-serif" font-size="16" font-weight="normal" fill="#64748b" text-anchor="middle" dominant-baseline="middle">Graph Traversal</text>
    
    <rect x="450" y="230" width="200" height="100" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="8"/>
    <text x="550" y="270" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#3b82f6" text-anchor="middle" dominant-baseline="middle">Dynamic Prog.</text>
    <text x="550" y="300" font-family="system-ui, sans-serif" font-size="16" font-weight="normal" fill="#64748b" text-anchor="middle" dominant-baseline="middle">Memoization</text>

    </svg>