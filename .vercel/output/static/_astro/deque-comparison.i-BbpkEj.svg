    <line x1="150" y1="285" x2="230" y2="285" stroke="#22c55e" stroke-width="3" marker-end="url(#arrow)"/> <text x="190" y="270" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#22c55e" text-anchor="middle" dominant-baseline="middle">In/Out</text>
    <line x1="230" y1="305" x2="150" y2="305" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)"/>
    
    <line x1="650" y1="285" x2="570" y2="285" stroke="#22c55e" stroke-width="3" marker-end="url(#arrow)"/> <text x="610" y="270" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#22c55e" text-anchor="middle" dominant-baseline="middle">In/Out</text>
    <line x1="570" y1="305" x2="650" y2="305" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)"/>

