<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#f8fafc" rx="8"/>
    
    <text x="400" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">Memoization (Caching)</text>
    
    <text x="200" y="150" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle" dominant-baseline="middle">fib(2) called</text>
    <line x1="280" y1="150" x2="350" y2="150" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
    
    <rect x="380" y="100" width="200" height="150" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="8"/>
    <text x="480" y="120" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle" dominant-baseline="middle">Cache (Hash Map)</text>
    <line x1="380" y1="140" x2="580" y2="140" stroke="#cbd5e1" stroke-width="2" />
    <text x="430" y="160" font-family="system-ui, sans-serif" font-size="14" font-weight="normal" fill="#0f172a" text-anchor="start" dominant-baseline="middle">n = 0  -&gt;  0</text>
    <text x="430" y="180" font-family="system-ui, sans-serif" font-size="14" font-weight="normal" fill="#0f172a" text-anchor="start" dominant-baseline="middle">n = 1  -&gt;  1</text>
    <text x="430" y="200" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#22c55e" text-anchor="start" dominant-baseline="middle">n = 2  -&gt;  1</text>
    <text x="430" y="220" font-family="system-ui, sans-serif" font-size="14" font-weight="normal" fill="#0f172a" text-anchor="start" dominant-baseline="middle">n = 3  -&gt;  2</text>
    
    <text x="480" y="300" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#22c55e" text-anchor="middle" dominant-baseline="middle">Return cached value instantly! O(1)</text>

    </svg>