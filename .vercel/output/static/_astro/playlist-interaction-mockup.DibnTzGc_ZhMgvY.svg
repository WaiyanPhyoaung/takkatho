<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#f8fafc" rx="8"/>
    
    <text x="400" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">Playlist as a Doubly Linked List</text>
    
    <rect x="100" y="150" width="150" height="80" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" rx="8"/> <text x="175" y="190" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle" dominant-baseline="middle">Song 1</text>
    <rect x="325" y="140" width="150" height="100" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8"/> <text x="400" y="190" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#1e3a8a" text-anchor="middle" dominant-baseline="middle">Song 2 (Playing)</text>
    <rect x="550" y="150" width="150" height="80" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" rx="8"/> <text x="625" y="190" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle" dominant-baseline="middle">Song 3</text>
    
    <line x1="250" y1="170" x2="325" y2="170" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <line x1="325" y1="210" x2="250" y2="210" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
    
    <line x1="475" y1="170" x2="550" y2="170" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <line x1="550" y1="210" x2="475" y2="210" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
    
    <text x="400" y="300" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle" dominant-baseline="middle">⏮ Prev (Red)      ⏭ Next (Blue)</text>

    </svg>