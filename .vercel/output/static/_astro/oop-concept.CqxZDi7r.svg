<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .box { fill: #f8f9fa; stroke: #343a40; stroke-width: 2; rx: 8; }
      .text-title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #212529; text-anchor: middle; }
      .text-desc { font-family: Arial, sans-serif; font-size: 14px; fill: #495057; text-anchor: middle; }
      .arrow { stroke: #28a745; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .highlight { fill: #e8f5e9; stroke: #28a745; stroke-width: 2; rx: 8; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#28a745" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="50" class="text-title" style="font-size: 24px;">Object-Oriented Programming (OOP) in Java</text>

  <!-- Class (Blueprint) -->
  <rect x="300" y="100" width="200" height="120" class="highlight" />
  <text x="400" y="130" class="text-title">Class (Blueprint)</text>
  <text x="400" y="160" class="text-desc">Car</text>
  <text x="400" y="180" class="text-desc">- color</text>
  <text x="400" y="200" class="text-desc">- drive()</text>

  <!-- Objects -->
  <rect x="100" y="300" width="150" height="100" class="box" />
  <text x="175" y="330" class="text-title">Object 1</text>
  <text x="175" y="360" class="text-desc">Red Car</text>
  <text x="175" y="380" class="text-desc">drive()</text>

  <rect x="325" y="300" width="150" height="100" class="box" />
  <text x="400" y="330" class="text-title">Object 2</text>
  <text x="400" y="360" class="text-desc">Blue Car</text>
  <text x="400" y="380" class="text-desc">drive()</text>

  <rect x="550" y="300" width="150" height="100" class="box" />
  <text x="625" y="330" class="text-title">Object 3</text>
  <text x="625" y="360" class="text-desc">Green Car</text>
  <text x="625" y="380" class="text-desc">drive()</text>

  <!-- Arrows -->
  <path d="M 350 220 L 200 290" class="arrow" />
  <path d="M 400 220 L 400 290" class="arrow" />
  <path d="M 450 220 L 600 290" class="arrow" />

  <!-- OOP Pillars -->
  <rect x="50" y="420" width="150" height="50" class="box" style="fill: #fff3cd; stroke: #ffc107;" />
  <text x="125" y="450" class="text-title" style="font-size: 14px;">Encapsulation</text>

  <rect x="225" y="420" width="150" height="50" class="box" style="fill: #fff3cd; stroke: #ffc107;" />
  <text x="300" y="450" class="text-title" style="font-size: 14px;">Inheritance</text>

  <rect x="400" y="420" width="150" height="50" class="box" style="fill: #fff3cd; stroke: #ffc107;" />
  <text x="475" y="450" class="text-title" style="font-size: 14px;">Polymorphism</text>

  <rect x="575" y="420" width="150" height="50" class="box" style="fill: #fff3cd; stroke: #ffc107;" />
  <text x="650" y="450" class="text-title" style="font-size: 14px;">Abstraction</text>
</svg>