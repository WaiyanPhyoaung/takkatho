<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#f8fafc" rx="8"/>
    
    <text x="400" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">Stack vs Heap Memory</text>
    
    <!-- Stack -->
    <rect x="150" y="100" width="200" height="250" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" rx="4"/>
    <text x="250" y="120" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle" dominant-baseline="middle">Stack (Fast, Ordered)</text>
    <rect x="170" y="280" width="160" height="40" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2" rx="4"/>
    <text x="250" y="300" font-family="system-ui, sans-serif" font-size="14" font-weight="normal" fill="#334155" text-anchor="middle" dominant-baseline="middle">main()</text>
    <rect x="170" y="230" width="160" height="40" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2" rx="4"/>
    <text x="250" y="250" font-family="system-ui, sans-serif" font-size="14" font-weight="normal" fill="#334155" text-anchor="middle" dominant-baseline="middle">var a = 10</text>
    <rect x="170" y="180" width="160" height="40" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2" rx="4"/>
    <text x="250" y="200" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1e3a8a" text-anchor="middle" dominant-baseline="middle">var obj = &lt;ref&gt;</text>
    
    <!-- Heap -->
    <rect x="450" y="100" width="250" height="250" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" rx="4"/>
    <text x="575" y="120" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle" dominant-baseline="middle">Heap (Large, Unordered)</text>
    <rect x="500" y="180" width="150" height="80" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8"/>
    <text x="575" y="210" font-family="system-ui, sans-serif" font-size="14" font-weight="normal" fill="#334155" text-anchor="middle" dominant-baseline="middle">{ name: 'Mg Mg',</text>
    <text x="575" y="230" font-family="system-ui, sans-serif" font-size="14" font-weight="normal" fill="#334155" text-anchor="middle" dominant-baseline="middle">  age: 20 }</text>
    
    <!-- Pointer -->
    <path d="M 330 200 C 400 200, 400 220, 490 220" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>

    </svg>