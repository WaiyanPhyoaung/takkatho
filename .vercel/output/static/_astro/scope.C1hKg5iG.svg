<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="100%" height="100%">
  <defs>
    <style>
      .bg     { fill: #1e1e2e; }
      .global { fill: #1e2840; stroke: #4f46e5; stroke-width: 2; stroke-dasharray: 6,3; }
      .local  { fill: #1e2820; stroke: #10b981; stroke-width: 2; }
      .inner  { fill: #181825; }
      .t-main { font-family: sans-serif; font-size: 14px; fill: #f8fafc; }
      .t-code { font-family: monospace; font-size: 13px; fill: #a5b4fc; }
      .t-lbl  { font-family: sans-serif; font-size: 12px; fill: #64748b; }
      .ok     { fill: #10b981; font-family: monospace; font-size: 12px; }
      .err    { fill: #f87171; font-family: monospace; font-size: 12px; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="400" y="26" font-family="sans-serif" font-size="17" font-weight="bold" text-anchor="middle" fill="#f8fafc">Variable Scope — Global နှင့် Local</text>

  <!-- Global scope outer box -->
  <rect x="20" y="40" width="760" height="300" rx="10" class="global"/>
  <text x="36" y="62" class="t-main" font-size="13" fill="#a78bfa">🌐  Global Scope  (Program တစ်ခုလုံးကနေ သုံးနိုင်)</text>

  <!-- Global variable -->
  <rect x="36" y="74" width="340" height="36" rx="4" class="inner"/>
  <text x="46" y="97" class="t-code">greeting = "မင်္ဂလာပါ"</text>
  <text x="385" y="97" class="t-lbl">← Global Variable</text>

  <!-- Local scope inner box -->
  <rect x="36" y="124" width="560" height="160" rx="8" class="local"/>
  <text x="52" y="146" class="t-main" font-size="12" fill="#6ee7b7">📦  Local Scope  (Function အထဲမှာပဲ သုံးနိုင်)</text>

  <rect x="52" y="156" width="528" height="116" rx="4" class="inner"/>
  <text x="64" y="178" class="t-code" fill="#c4b5fd">def say_hello():</text>
  <text x="80" y="200" class="t-code">secret = "ဒီ function ထဲပဲ ရှိမယ်"</text>
  <text x="80" y="220" class="t-code">print(greeting)</text>
  <text x="300" y="220" class="ok">✓  Global ကို သုံးနိုင်</text>
  <text x="80" y="242" class="t-code">print(secret)</text>
  <text x="300" y="242" class="ok">✓  Local ကို သုံးနိုင်</text>
  <text x="80" y="260" class="t-code" fill="#64748b"># Function ပြီးရင် secret ပျောက်သွားသည်</text>

  <!-- Outside function -->
  <rect x="36" y="294" width="560" height="36" rx="4" class="inner"/>
  <text x="46" y="317" class="t-code">print(secret)</text>
  <text x="175" y="317" class="err">✗  NameError!  ←  Local variable ကို အပြင်ကနေ မသုံးနိုင်</text>

  <!-- Right side legend -->
  <rect x="618" y="124" width="148" height="160" rx="8" class="inner"/>
  <text x="692" y="148" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#94a3b8">နှိုင်းယှဉ်ချက်</text>
  <text x="628" y="172" class="t-lbl" fill="#a78bfa">Global</text>
  <text x="628" y="190" class="t-lbl">→ နေရာတိုင်းကနေ</text>
  <text x="628" y="206" class="t-lbl">   သုံးနိုင်</text>
  <text x="628" y="232" class="t-lbl" fill="#6ee7b7">Local</text>
  <text x="628" y="250" class="t-lbl">→ Function ထဲကနေ</text>
  <text x="628" y="266" class="t-lbl">   သာ သုံးနိုင်</text>
</svg>
