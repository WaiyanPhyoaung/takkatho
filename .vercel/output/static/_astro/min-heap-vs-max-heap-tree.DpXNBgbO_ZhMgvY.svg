<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#f8fafc" rx="8"/>
    
    <text x="400" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">Min-Heap vs Max-Heap</text>
    
    <text x="200" y="100" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle" dominant-baseline="middle">Min-Heap (Smallest at Top)</text>
    <circle cx="200" cy="150" r="25" fill="#dcfce3" stroke="#3b82f6" stroke-width="2"/><text x="200" y="150" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">10</text>
    <line x1="185" y1="170" x2="140" y2="220" stroke="#334155" stroke-width="2" />
    <line x1="215" y1="170" x2="260" y2="220" stroke="#334155" stroke-width="2" />
    <circle cx="120" cy="240" r="25" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/><text x="120" y="240" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">20</text>
    <circle cx="280" cy="240" r="25" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/><text x="280" y="240" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">15</text>
    
    <text x="600" y="100" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle" dominant-baseline="middle">Max-Heap (Largest at Top)</text>
    <circle cx="600" cy="150" r="25" fill="#fef08a" stroke="#3b82f6" stroke-width="2"/><text x="600" y="150" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">90</text>
    <line x1="585" y1="170" x2="540" y2="220" stroke="#334155" stroke-width="2" />
    <line x1="615" y1="170" x2="660" y2="220" stroke="#334155" stroke-width="2" />
    <circle cx="520" cy="240" r="25" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/><text x="520" y="240" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">80</text>
    <circle cx="680" cy="240" r="25" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/><text x="680" y="240" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">70</text>

