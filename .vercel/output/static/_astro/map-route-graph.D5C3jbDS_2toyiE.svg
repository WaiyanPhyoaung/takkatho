<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#f8fafc" rx="8"/>
    
    <text x="400" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">Weighted Graph (Map Routing)</text>
    
    <circle cx="200" cy="150" r="25" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/><text x="200" y="150" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">A</text>
    <circle cx="400" cy="100" r="25" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/><text x="400" y="100" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">B</text>
    <circle cx="400" cy="250" r="25" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/><text x="400" y="250" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">C</text>
    <circle cx="600" cy="150" r="25" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/><text x="600" y="150" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">D</text>
    
    <line x1="225" y1="140" x2="375" y2="110" stroke="#334155" stroke-width="2" /> <text x="300" y="110" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ef4444" text-anchor="middle" dominant-baseline="middle">5 mins</text>
    <line x1="225" y1="160" x2="375" y2="240" stroke="#3b82f6" stroke-width="4" /> <text x="300" y="210" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#3b82f6" text-anchor="middle" dominant-baseline="middle">2 mins</text>
    <line x1="425" y1="110" x2="575" y2="140" stroke="#334155" stroke-width="2" /> <text x="500" y="110" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ef4444" text-anchor="middle" dominant-baseline="middle">6 mins</text>
    <line x1="425" y1="240" x2="575" y2="160" stroke="#3b82f6" stroke-width="4" /> <text x="500" y="210" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#3b82f6" text-anchor="middle" dominant-baseline="middle">1 min</text>
    <line x1="400" y1="125" x2="400" y2="225" stroke="#334155" stroke-width="2" /> <text x="420" y="175" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ef4444" text-anchor="start" dominant-baseline="middle">8 mins</text>
    
    <text x="400" y="330" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1d4ed8" text-anchor="middle" dominant-baseline="middle">Shortest Path A -&gt; D is A -&gt; C -&gt; D (3 mins)</text>

    </svg>