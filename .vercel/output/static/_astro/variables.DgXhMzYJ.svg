<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #1e1e2e; }
      .box { fill: #2d2d3f; stroke: #4f46e5; stroke-width: 2; rx: 8; }
      .text-title { fill: #f8fafc; font-family: sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
      .text-code { fill: #a5b4fc; font-family: monospace; font-size: 16px; text-anchor: middle; }
      .text-label { fill: #10b981; font-family: monospace; font-size: 14px; text-anchor: middle; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <!-- String -->
  <rect x="50" y="80" width="150" height="120" class="box" />
  <text x="125" y="110" class="text-title">String</text>
  <text x="125" y="140" class="text-label">name</text>
  <rect x="65" y="150" width="120" height="35" fill="#181825" rx="4" />
  <text x="125" y="173" class="text-code">"Aung Aung"</text>

  <!-- Integer -->
  <rect x="230" y="80" width="150" height="120" class="box" />
  <text x="305" y="110" class="text-title">Integer</text>
  <text x="305" y="140" class="text-label">age</text>
  <rect x="245" y="150" width="120" height="35" fill="#181825" rx="4" />
  <text x="305" y="173" class="text-code">20</text>

  <!-- Float -->
  <rect x="410" y="80" width="150" height="120" class="box" />
  <text x="485" y="110" class="text-title">Float</text>
  <text x="485" y="140" class="text-label">price</text>
  <rect x="425" y="150" width="120" height="35" fill="#181825" rx="4" />
  <text x="485" y="173" class="text-code">99.99</text>

  <!-- Boolean -->
  <rect x="590" y="80" width="150" height="120" class="box" />
  <text x="665" y="110" class="text-title">Boolean</text>
  <text x="665" y="140" class="text-label">is_student</text>
  <rect x="605" y="150" width="120" height="35" fill="#181825" rx="4" />
  <text x="665" y="173" class="text-code">True</text>

</svg>
