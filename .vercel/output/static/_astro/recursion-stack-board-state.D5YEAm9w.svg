<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#f8fafc" rx="8"/>
    
    <text x="400" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">Sudoku Backtracking</text>
    
    <rect x="350" y="100" width="100" height="100" fill="none" stroke="#334155" stroke-width="2" rx="0"/>
    <line x1="350" y1="133" x2="450" y2="133" stroke="#334155" stroke-width="1" />
    <line x1="350" y1="166" x2="450" y2="166" stroke="#334155" stroke-width="1" />
    <line x1="383" y1="100" x2="383" y2="200" stroke="#334155" stroke-width="1" />
    <line x1="416" y1="100" x2="416" y2="200" stroke="#334155" stroke-width="1" />
    
    <text x="366" y="116" font-family="system-ui, sans-serif" font-size="16" font-weight="normal" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">5</text>
    <text x="400" y="116" font-family="system-ui, sans-serif" font-size="16" font-weight="normal" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">3</text>
    <text x="366" y="150" font-family="system-ui, sans-serif" font-size="16" font-weight="normal" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">6</text>
    
    <text x="400" y="150" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ef4444" text-anchor="middle" dominant-baseline="middle">3</text>
    <path d="M 480 150 L 420 150" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrow-red)"/>
    <text x="550" y="150" font-family="system-ui, sans-serif" font-size="14" font-weight="normal" fill="#ef4444" text-anchor="start" dominant-baseline="middle">Conflict! (Row has 3)</text>
    
    <path d="M 550 170 Q 500 200 420 160" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
    <text x="550" y="190" font-family="system-ui, sans-serif" font-size="14" font-weight="normal" fill="#3b82f6" text-anchor="start" dominant-baseline="middle">Backtrack &amp; Try 4</text>

