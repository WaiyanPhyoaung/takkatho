<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#f8fafc" rx="8"/>
    
    <text x="400" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">Big O Complexity Chart</text>
    <line x1="100" y1="350" x2="700" y2="350" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="100" y1="350" x2="100" y2="80" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="720" y="350" font-family="system-ui, sans-serif" font-size="14" font-weight="normal" fill="#64748b" text-anchor="start" dominant-baseline="middle">Elements (n)</text>
    <text x="100" y="60" font-family="system-ui, sans-serif" font-size="14" font-weight="normal" fill="#64748b" text-anchor="middle" dominant-baseline="middle">Operations</text>
    
    <!-- O(1) -->
    <line x1="100" y1="300" x2="650" y2="300" stroke="#22c55e" stroke-width="3" />
    <text x="670" y="300" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#22c55e" text-anchor="start" dominant-baseline="middle">O(1)</text>
    
    <!-- O(log n) -->
    <path d="M 100 350 Q 200 250 650 200" stroke="#3b82f6" stroke-width="3" fill="none" />
    <text x="670" y="200" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#3b82f6" text-anchor="start" dominant-baseline="middle">O(log n)</text>
    
    <!-- O(n) -->
    <line x1="100" y1="350" x2="600" y2="100" stroke="#eab308" stroke-width="3" />
    <text x="620" y="100" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#eab308" text-anchor="start" dominant-baseline="middle">O(n)</text>
    
    <!-- O(n^2) -->
    <path d="M 100 350 Q 300 350 400 100" stroke="#ef4444" stroke-width="3" fill="none" />
    <text x="420" y="100" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ef4444" text-anchor="start" dominant-baseline="middle">O(n²)</text>

    </svg>