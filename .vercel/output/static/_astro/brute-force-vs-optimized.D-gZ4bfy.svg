<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#f8fafc" rx="8"/>
    
    <text x="400" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">Brute Force vs Optimized</text>
    
    <text x="150" y="120" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#ef4444" text-anchor="middle" dominant-baseline="middle">Brute Force O(n²)</text>
    <rect x="100" y="150" width="100" height="100" fill="#fee2e2" stroke="#ef4444" stroke-width="2" rx="8"/>
    <text x="150" y="200" font-family="system-ui, sans-serif" font-size="24" font-weight="normal" fill="#991b1b" text-anchor="middle" dominant-baseline="middle">🐢 Slow</text>
    <text x="150" y="280" font-family="system-ui, sans-serif" font-size="14" font-weight="normal" fill="#64748b" text-anchor="middle" dominant-baseline="middle">Nested Loops</text>
    
    <text x="400" y="200" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#334155" text-anchor="middle" dominant-baseline="middle">VS</text>
    
    <text x="650" y="120" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#22c55e" text-anchor="middle" dominant-baseline="middle">Optimized O(n)</text>
    <rect x="600" y="150" width="100" height="100" fill="#dcfce3" stroke="#22c55e" stroke-width="2" rx="8"/>
    <text x="650" y="200" font-family="system-ui, sans-serif" font-size="24" font-weight="normal" fill="#166534" text-anchor="middle" dominant-baseline="middle">🐇 Fast</text>
    <text x="650" y="280" font-family="system-ui, sans-serif" font-size="14" font-weight="normal" fill="#64748b" text-anchor="middle" dominant-baseline="middle">Hash Maps / Pointers</text>

    </svg>