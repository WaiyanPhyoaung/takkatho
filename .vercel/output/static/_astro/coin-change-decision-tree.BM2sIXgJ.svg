<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#f8fafc" rx="8"/>
    
    <text x="400" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">Greedy vs Optimal (Coin Change)</text>
    
    <text x="400" y="80" font-family="system-ui, sans-serif" font-size="16" font-weight="normal" fill="#334155" text-anchor="middle" dominant-baseline="middle">Target: 12 | Coins: [10, 6, 1]</text>
    
    <text x="200" y="130" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#ef4444" text-anchor="middle" dominant-baseline="middle">Greedy Approach</text>
    <rect x="150" y="150" width="100" height="40" fill="#fee2e2" stroke="#ef4444" stroke-width="2" rx="8"/> <text x="200" y="170" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#991b1b" text-anchor="middle" dominant-baseline="middle">Take 10</text>
    <line x1="200" y1="190" x2="200" y2="220" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
    <rect x="150" y="220" width="100" height="40" fill="#fee2e2" stroke="#ef4444" stroke-width="2" rx="8"/> <text x="200" y="240" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#991b1b" text-anchor="middle" dominant-baseline="middle">Take 1</text>
    <line x1="200" y1="260" x2="200" y2="290" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
    <rect x="150" y="290" width="100" height="40" fill="#fee2e2" stroke="#ef4444" stroke-width="2" rx="8"/> <text x="200" y="310" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#991b1b" text-anchor="middle" dominant-baseline="middle">Take 1</text>
    <text x="200" y="350" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ef4444" text-anchor="middle" dominant-baseline="middle">Total: 3 coins</text>
    
    <text x="600" y="130" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#22c55e" text-anchor="middle" dominant-baseline="middle">Optimal (DP)</text>
    <rect x="550" y="150" width="100" height="40" fill="#dcfce3" stroke="#22c55e" stroke-width="2" rx="8"/> <text x="600" y="170" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#166534" text-anchor="middle" dominant-baseline="middle">Take 6</text>
    <line x1="600" y1="190" x2="600" y2="220" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="550" y="220" width="100" height="40" fill="#dcfce3" stroke="#22c55e" stroke-width="2" rx="8"/> <text x="600" y="240" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#166534" text-anchor="middle" dominant-baseline="middle">Take 6</text>
    <text x="600" y="350" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#22c55e" text-anchor="middle" dominant-baseline="middle">Total: 2 coins</text>

    </svg>