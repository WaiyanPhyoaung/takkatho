<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400">
  <rect width="720" height="350" fill="#1e1e2e"/>
  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-family="monospace" font-size="15" fill="#e2e8f0" font-weight="bold">Block vs Inline Elements</text>

  <!-- LEFT: Block column -->
  <text x="180" y="60" text-anchor="middle" font-family="monospace" font-size="13" fill="#7c3aed" font-weight="bold">Block Elements</text>
  <text x="180" y="78" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">(တစ်ကြောင်းစီ ယူတယ်)</text>

  <!-- block element boxes -->
  <rect x="30" y="92" width="300" height="44" rx="5" fill="#2d2d3f" stroke="#7c3aed" stroke-width="2"/>
  <text x="180" y="109" text-anchor="middle" font-family="monospace" font-size="12" fill="#a78bfa">&lt;h1&gt;ခေါင်းစဉ်&lt;/h1&gt;</text>
  <text x="180" y="127" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">← full width ယူသွားတယ် →</text>

  <rect x="30" y="148" width="300" height="44" rx="5" fill="#2d2d3f" stroke="#7c3aed" stroke-width="2"/>
  <text x="180" y="165" text-anchor="middle" font-family="monospace" font-size="12" fill="#a78bfa">&lt;p&gt;စာပိုဒ်&lt;/p&gt;</text>
  <text x="180" y="183" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">← new line ကနေ စတယ် →</text>

  <rect x="30" y="204" width="300" height="44" rx="5" fill="#2d2d3f" stroke="#7c3aed" stroke-width="2"/>
  <text x="180" y="221" text-anchor="middle" font-family="monospace" font-size="12" fill="#a78bfa">&lt;div&gt;container&lt;/div&gt;</text>
  <text x="180" y="239" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">← full width ယူသွားတယ် →</text>

  <text x="180" y="268" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">Examples: &lt;h1&gt; &lt;p&gt; &lt;div&gt; &lt;ul&gt; &lt;table&gt; &lt;form&gt;</text>

  <!-- RIGHT: Inline column -->
  <text x="540" y="60" text-anchor="middle" font-family="monospace" font-size="13" fill="#0ea5e9" font-weight="bold">Inline Elements</text>
  <text x="540" y="78" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">(content အကျယ်လောက်ပဲ ယူတယ်)</text>

  <!-- inline elements flow in a line -->
  <rect x="390" y="92" width="300" height="80" rx="5" fill="#1a1a2e" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- inline boxes inside the container -->
  <rect x="400" y="102" width="58" height="28" rx="3" fill="#2d2d3f" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="429" y="121" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">&lt;a&gt;</text>
  <rect x="462" y="102" width="70" height="28" rx="3" fill="#2d2d3f" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="497" y="121" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">&lt;strong&gt;</text>
  <rect x="536" y="102" width="52" height="28" rx="3" fill="#2d2d3f" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="562" y="121" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">&lt;em&gt;</text>
  <rect x="592" y="102" width="50" height="28" rx="3" fill="#2d2d3f" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="617" y="121" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">&lt;img&gt;</text>
  <!-- overflow to next line -->
  <rect x="400" y="136" width="60" height="28" rx="3" fill="#2d2d3f" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="430" y="155" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">&lt;span&gt;</text>

  <text x="540" y="197" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">ကန့်သတ်ချက်: line ကနေ မဆင်း</text>
  <text x="540" y="214" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">content နောက်မှာ ဆက်ထိုင်တယ်</text>
  <text x="540" y="238" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">Examples: &lt;a&gt; &lt;span&gt; &lt;img&gt; &lt;strong&gt; &lt;em&gt;</text>

  <!-- Divider line -->
  <line x1="360" y1="50" x2="360" y2="280" stroke="#2d2d3f" stroke-width="2"/>

</svg>
