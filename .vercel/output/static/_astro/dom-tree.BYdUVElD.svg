<svg xmlns="http://www.w3.org/2000/svg" width="720" height="440" viewBox="0 0 720 440">
  <rect width="720" height="440" fill="#1e1e2e"/>
  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" font-family="monospace" font-size="15" fill="#e2e8f0" font-weight="bold">HTML Document Object Model (DOM Tree)</text>
  <!-- html node -->
  <rect x="290" y="52" width="140" height="38" rx="6" fill="#2d2d3f" stroke="#7c3aed" stroke-width="2"/>
  <text x="360" y="76" text-anchor="middle" font-family="monospace" font-size="14" fill="#a78bfa">&lt;html&gt;</text>
  <!-- line to head -->
  <line x1="300" y1="90" x2="180" y2="140" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- line to body -->
  <line x1="420" y1="90" x2="540" y2="140" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- head node -->
  <rect x="110" y="140" width="140" height="38" rx="6" fill="#2d2d3f" stroke="#7c3aed" stroke-width="2"/>
  <text x="180" y="164" text-anchor="middle" font-family="monospace" font-size="14" fill="#a78bfa">&lt;head&gt;</text>
  <!-- body node -->
  <rect x="470" y="140" width="140" height="38" rx="6" fill="#2d2d3f" stroke="#7c3aed" stroke-width="2"/>
  <text x="540" y="164" text-anchor="middle" font-family="monospace" font-size="14" fill="#a78bfa">&lt;body&gt;</text>
  <!-- head children -->
  <!-- line to meta -->
  <line x1="150" y1="178" x2="90" y2="228" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- line to title -->
  <line x1="210" y1="178" x2="270" y2="228" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- meta node -->
  <rect x="30" y="228" width="120" height="36" rx="6" fill="#2d2d3f" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="90" y="251" text-anchor="middle" font-family="monospace" font-size="13" fill="#94a3b8">&lt;meta&gt;</text>
  <!-- title node -->
  <rect x="210" y="228" width="120" height="36" rx="6" fill="#2d2d3f" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="270" y="251" text-anchor="middle" font-family="monospace" font-size="13" fill="#94a3b8">&lt;title&gt;</text>
  <!-- title text child -->
  <line x1="270" y1="264" x2="270" y2="300" stroke="#64748b" stroke-width="1.5"/>
  <rect x="200" y="300" width="140" height="30" rx="4" fill="#1e1e2e" stroke="#64748b" stroke-width="1"/>
  <text x="270" y="320" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">"My Page" (text)</text>
  <!-- body children -->
  <!-- line to h1 -->
  <line x1="510" y1="178" x2="430" y2="228" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- line to p -->
  <line x1="540" y1="178" x2="540" y2="228" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- line to img -->
  <line x1="570" y1="178" x2="650" y2="228" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- h1 node -->
  <rect x="360" y="228" width="120" height="36" rx="6" fill="#2d2d3f" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="420" y="251" text-anchor="middle" font-family="monospace" font-size="13" fill="#94a3b8">&lt;h1&gt;</text>
  <!-- p node -->
  <rect x="480" y="228" width="120" height="36" rx="6" fill="#2d2d3f" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="540" y="251" text-anchor="middle" font-family="monospace" font-size="13" fill="#94a3b8">&lt;p&gt;</text>
  <!-- img node -->
  <rect x="600" y="228" width="110" height="36" rx="6" fill="#2d2d3f" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="655" y="251" text-anchor="middle" font-family="monospace" font-size="13" fill="#94a3b8">&lt;img&gt;</text>
  <!-- h1 text child -->
  <line x1="420" y1="264" x2="420" y2="300" stroke="#64748b" stroke-width="1.5"/>
  <rect x="355" y="300" width="130" height="30" rx="4" fill="#1e1e2e" stroke="#64748b" stroke-width="1"/>
  <text x="420" y="320" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">"Welcome" (text)</text>
  <!-- p text child -->
  <line x1="540" y1="264" x2="540" y2="300" stroke="#64748b" stroke-width="1.5"/>
  <rect x="475" y="300" width="130" height="30" rx="4" fill="#1e1e2e" stroke="#64748b" stroke-width="1"/>
  <text x="540" y="320" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">"Hello..." (text)</text>
  <!-- Legend -->
  <rect x="20" y="380" width="16" height="16" rx="3" fill="#2d2d3f" stroke="#7c3aed" stroke-width="2"/>
  <text x="44" y="393" font-family="monospace" font-size="12" fill="#e2e8f0">Parent/Child element</text>
  <rect x="240" y="380" width="16" height="16" rx="3" fill="#2d2d3f" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="264" y="393" font-family="monospace" font-size="12" fill="#e2e8f0">Child element</text>
  <rect x="440" y="380" width="16" height="16" rx="3" fill="#1e1e2e" stroke="#64748b" stroke-width="1"/>
  <text x="464" y="393" font-family="monospace" font-size="12" fill="#e2e8f0">Text node</text>
  <!-- Myanmar label -->
  <text x="360" y="420" text-anchor="middle" font-family="monospace" font-size="12" fill="#64748b">မိသားစုပင်လိုမျိုး parent → child ဆက်ဆံရေး ရှိပါတယ်</text>
</svg>
