<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#f8fafc" rx="8"/>
    
    <text x="400" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">Tree Structure: File System</text>
    
    <rect x="350" y="80" width="100" height="40" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" rx="8"/> <text x="400" y="100" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle" dominant-baseline="middle">Root (C:)</text>
    
    <line x1="400" y1="120" x2="250" y2="180" stroke="#334155" stroke-width="2" />
    <line x1="400" y1="120" x2="550" y2="180" stroke="#334155" stroke-width="2" />
    
    <rect x="200" y="180" width="100" height="40" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" rx="8"/> <text x="250" y="200" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle" dominant-baseline="middle">Users</text>
    <rect x="500" y="180" width="100" height="40" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" rx="8"/> <text x="550" y="200" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle" dominant-baseline="middle">Windows</text>
    
    <line x1="250" y1="220" x2="150" y2="280" stroke="#334155" stroke-width="2" />
    <line x1="250" y1="220" x2="350" y2="280" stroke="#334155" stroke-width="2" />
    
    <rect x="100" y="280" width="100" height="40" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8"/> <text x="150" y="300" font-family="system-ui, sans-serif" font-size="14" font-weight="normal" fill="#1e3a8a" text-anchor="middle" dominant-baseline="middle">Documents</text>
    <rect x="300" y="280" width="100" height="40" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8"/> <text x="350" y="300" font-family="system-ui, sans-serif" font-size="14" font-weight="normal" fill="#1e3a8a" text-anchor="middle" dominant-baseline="middle">Downloads</text>

    </svg>