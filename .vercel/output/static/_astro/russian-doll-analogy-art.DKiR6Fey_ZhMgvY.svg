<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#f8fafc" rx="8"/>
    
    <text x="400" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">Recursion: Russian Nesting Dolls</text>
    
    <rect x="150" y="100" width="160" height="200" fill="#f8fafc" stroke="#3b82f6" stroke-width="2" rx="80"/>
    <text x="230" y="200" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#3b82f6" text-anchor="middle" dominant-baseline="middle">Doll 1</text>
    
    <rect x="350" y="130" width="120" height="170" fill="#f8fafc" stroke="#2563eb" stroke-width="2" rx="60"/>
    <text x="410" y="215" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#2563eb" text-anchor="middle" dominant-baseline="middle">Doll 2</text>
    
    <rect x="510" y="160" width="80" height="140" fill="#f8fafc" stroke="#1d4ed8" stroke-width="2" rx="40"/>
    <text x="550" y="230" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1d4ed8" text-anchor="middle" dominant-baseline="middle">Doll 3</text>
    
    <rect x="630" y="200" width="40" height="100" fill="#1e3a8a" stroke="#1e3a8a" stroke-width="2" rx="20"/>
    <text x="650" y="250" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">Base</text>
    
    <line x1="320" y1="200" x2="340" y2="200" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="480" y1="215" x2="500" y2="215" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="600" y1="230" x2="620" y2="230" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    
    <text x="400" y="350" font-family="system-ui, sans-serif" font-size="16" font-weight="normal" fill="#334155" text-anchor="middle" dominant-baseline="middle">Function calls itself until it reaches the smallest (Base Case)</text>

    </svg>