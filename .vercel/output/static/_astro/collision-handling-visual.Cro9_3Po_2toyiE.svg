<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#f8fafc" rx="8"/>
    
    <text x="400" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">Hash Collision (Chaining)</text>
    
    <text x="150" y="120" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle" dominant-baseline="middle">Keys</text>
    <rect x="100" y="150" width="100" height="40" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" rx="4"/> <text x="150" y="170" font-family="system-ui, sans-serif" font-size="16" font-weight="normal" fill="#334155" text-anchor="middle" dominant-baseline="middle">'John'</text>
    <rect x="100" y="220" width="100" height="40" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" rx="4"/> <text x="150" y="240" font-family="system-ui, sans-serif" font-size="16" font-weight="normal" fill="#334155" text-anchor="middle" dominant-baseline="middle">'Jane'</text>
    
    <text x="400" y="120" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle" dominant-baseline="middle">Array (Buckets)</text>
    <rect x="350" y="150" width="100" height="40" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="4"/><text x="400" y="170" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle"></text><text x="400" y="205" font-family="system-ui, sans-serif" font-size="12" font-weight="normal" fill="#64748b" text-anchor="middle" dominant-baseline="middle">0</text><rect x="450" y="150" width="100" height="40" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="4"/><text x="500" y="170" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">Index 1</text><text x="500" y="205" font-family="system-ui, sans-serif" font-size="12" font-weight="normal" fill="#64748b" text-anchor="middle" dominant-baseline="middle">1</text><rect x="550" y="150" width="100" height="40" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="4"/><text x="600" y="170" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle"></text><text x="600" y="205" font-family="system-ui, sans-serif" font-size="12" font-weight="normal" fill="#64748b" text-anchor="middle" dominant-baseline="middle">2</text><rect x="650" y="150" width="100" height="40" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="4"/><text x="700" y="170" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle"></text><text x="700" y="205" font-family="system-ui, sans-serif" font-size="12" font-weight="normal" fill="#64748b" text-anchor="middle" dominant-baseline="middle">3</text>
    
    <path d="M 200 170 L 350 190" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrow-red)"/>
    <path d="M 200 240 L 350 190" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrow-red)"/>
    
    <text x="275" y="230" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ef4444" text-anchor="middle" dominant-baseline="middle">Collision!</text>
    
    <text x="600" y="120" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle" dominant-baseline="middle">Linked List</text>
    <rect x="500" y="170" width="80" height="40" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="4"/> <text x="540" y="190" font-family="system-ui, sans-serif" font-size="16" font-weight="normal" fill="#334155" text-anchor="middle" dominant-baseline="middle">John</text>
    <line x1="580" y1="190" x2="630" y2="190" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <rect x="630" y="170" width="80" height="40" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="4"/> <text x="670" y="190" font-family="system-ui, sans-serif" font-size="16" font-weight="normal" fill="#334155" text-anchor="middle" dominant-baseline="middle">Jane</text>
    
    <line x1="450" y1="190" x2="500" y2="190" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

    </svg>