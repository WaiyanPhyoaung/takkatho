<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #1e1e2e; }
      .box { fill: #2d2d3f; stroke: #4f46e5; stroke-width: 2; rx: 8; }
      .box-obj { fill: #2d2d3f; stroke: #10b981; stroke-width: 2; rx: 8; }
      .text-title { fill: #f8fafc; font-family: sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
      .text-sub { fill: #94a3b8; font-family: sans-serif; font-size: 14px; text-anchor: middle; }
      .text-code { fill: #a5b4fc; font-family: monospace; font-size: 14px; }
      .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <!-- Class (Blueprint) -->
  <rect x="100" y="100" width="200" height="200" class="box" />
  <text x="200" y="140" class="text-title">Class (Blueprint)</text>
  <text x="200" y="165" class="text-sub">"Dog"</text>
  
  <rect x="120" y="180" width="160" height="100" fill="#181825" rx="4" />
  <text x="130" y="205" class="text-code">- name</text>
  <text x="130" y="230" class="text-code">- breed</text>
  <text x="130" y="260" class="text-code">+ bark()</text>

  <!-- Arrows -->
  <path d="M 310 200 L 430 130" class="arrow" />
  <path d="M 310 200 L 430 270" class="arrow" />

  <!-- Object 1 -->
  <rect x="450" y="50" width="250" height="130" class="box-obj" />
  <text x="575" y="80" class="text-title">Object 1</text>
  
  <rect x="470" y="95" width="210" height="70" fill="#181825" rx="4" />
  <text x="480" y="120" class="text-code">name = "Aung Net"</text>
  <text x="480" y="145" class="text-code">breed = "Golden Retriever"</text>

  <!-- Object 2 -->
  <rect x="450" y="220" width="250" height="130" class="box-obj" />
  <text x="575" y="250" class="text-title">Object 2</text>
  
  <rect x="470" y="265" width="210" height="70" fill="#181825" rx="4" />
  <text x="480" y="290" class="text-code">name = "Phoe Wa"</text>
  <text x="480" y="315" class="text-code">breed = "Bulldog"</text>

</svg>
