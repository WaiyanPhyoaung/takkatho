<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#f8fafc" rx="8"/>
    
    <text x="400" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">Priority Queue: ER Triage</text>
    
    <rect x="200" y="100" width="400" height="200" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="8"/>
    <rect x="200" y="100" width="400" height="40" fill="#334155" stroke="#334155" stroke-width="2" rx="8"/>
    <text x="400" y="120" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">Waiting List (Sorted by Severity)</text>
    
    <rect x="220" y="160" width="360" height="40" fill="#fee2e2" stroke="#ef4444" stroke-width="2" rx="4"/>
    <text x="240" y="180" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#991b1b" text-anchor="start" dominant-baseline="middle">1. Patient A (Heart Attack)</text>
    <text x="560" y="180" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#991b1b" text-anchor="end" dominant-baseline="middle">Severity: 10</text>
    
    <rect x="220" y="210" width="360" height="40" fill="#fef08a" stroke="#eab308" stroke-width="2" rx="4"/>
    <text x="240" y="230" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#854d0e" text-anchor="start" dominant-baseline="middle">2. Patient B (Broken Arm)</text>
    <text x="560" y="230" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#854d0e" text-anchor="end" dominant-baseline="middle">Severity: 7</text>
    
    <rect x="220" y="260" width="360" height="40" fill="#dcfce3" stroke="#22c55e" stroke-width="2" rx="4"/>
    <text x="240" y="280" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#166534" text-anchor="start" dominant-baseline="middle">3. Patient C (Mild Fever)</text>
    <text x="560" y="280" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#166534" text-anchor="end" dominant-baseline="middle">Severity: 2</text>

    </svg>