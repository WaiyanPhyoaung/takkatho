<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      .box { fill: #f8f9fa; stroke: #343a40; stroke-width: 2; rx: 8; }
      .text-title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #212529; text-anchor: middle; }
      .text-desc { font-family: Arial, sans-serif; font-size: 14px; fill: #495057; text-anchor: middle; }
      .arrow { stroke: #007bff; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .highlight { fill: #e3f2fd; stroke: #007bff; stroke-width: 2; rx: 8; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#007bff" />
    </marker>
  </defs>

  <!-- Source Code -->
  <rect x="50" y="150" width="150" height="100" class="box" />
  <text x="125" y="190" class="text-title">Source Code</text>
  <text x="125" y="215" class="text-desc">HelloWorld.java</text>
  <text x="125" y="235" class="text-desc">(Human Readable)</text>

  <!-- Compiler -->
  <rect x="250" y="165" width="100" height="70" class="highlight" />
  <text x="300" y="195" class="text-title">Compiler</text>
  <text x="300" y="215" class="text-desc">javac</text>

  <!-- Bytecode -->
  <rect x="400" y="150" width="150" height="100" class="box" />
  <text x="475" y="190" class="text-title">Bytecode</text>
  <text x="475" y="215" class="text-desc">HelloWorld.class</text>
  <text x="475" y="235" class="text-desc">(Platform Independent)</text>

  <!-- JVM -->
  <rect x="600" y="150" width="150" height="100" class="highlight" />
  <text x="675" y="190" class="text-title">JVM</text>
  <text x="675" y="215" class="text-desc">Java Virtual Machine</text>
  <text x="675" y="235" class="text-desc">(Runs on OS)</text>

  <!-- Arrows -->
  <path d="M 200 200 L 240 200" class="arrow" />
  <path d="M 350 200 L 390 200" class="arrow" />
  <path d="M 550 200 L 590 200" class="arrow" />

  <!-- OS Platforms -->
  <rect x="550" y="300" width="70" height="40" class="box" />
  <text x="585" y="325" class="text-desc">Windows</text>
  
  <rect x="640" y="300" width="70" height="40" class="box" />
  <text x="675" y="325" class="text-desc">Mac OS</text>
  
  <rect x="730" y="300" width="70" height="40" class="box" />
  <text x="765" y="325" class="text-desc">Linux</text>

  <path d="M 675 250 L 675 290" class="arrow" />
  <path d="M 650 250 L 585 290" class="arrow" />
  <path d="M 700 250 L 765 290" class="arrow" />

  <!-- Title -->
  <text x="400" y="50" class="text-title" style="font-size: 24px;">How Java Works (Write Once, Run Anywhere)</text>
</svg>