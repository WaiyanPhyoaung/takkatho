<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300">
  <rect width="100%" height="100%" fill="#f8fafc" rx="8"/>
  <text x="320" y="34" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#0f172a" text-anchor="middle">StudentAdvisor Table (3NF, but not BCNF)</text>

  <!-- header -->
  <rect x="80" y="60" width="160" height="40" fill="#1e293b" stroke="#1e293b" stroke-width="1"/>
  <rect x="240" y="60" width="160" height="40" fill="#1e293b" stroke="#1e293b" stroke-width="1"/>
  <rect x="400" y="60" width="160" height="40" fill="#1e293b" stroke="#1e293b" stroke-width="1"/>
  <text x="160" y="85" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">Student</text>
  <text x="320" y="85" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">Subject</text>
  <text x="480" y="85" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">Advisor</text>

  <!-- rows -->
  <g font-family="system-ui, sans-serif" font-size="14" fill="#334155" text-anchor="middle">
    <rect x="80" y="100" width="160" height="36" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="240" y="100" width="160" height="36" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="400" y="100" width="160" height="36" fill="#fef08a" stroke="#eab308"/>
    <text x="160" y="123">Alice</text><text x="320" y="123">Math</text><text x="480" y="123">Prof. Lee</text>

    <rect x="80" y="136" width="160" height="36" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="240" y="136" width="160" height="36" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="400" y="136" width="160" height="36" fill="#fef08a" stroke="#eab308"/>
    <text x="160" y="159">Bob</text><text x="320" y="159">Math</text><text x="480" y="159">Prof. Lee</text>

    <rect x="80" y="172" width="160" height="36" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="240" y="172" width="160" height="36" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="400" y="172" width="160" height="36" fill="#fef08a" stroke="#eab308"/>
    <text x="160" y="195">Alice</text><text x="320" y="195">Physics</text><text x="480" y="195">Prof. Kim</text>
  </g>

  <line x1="480" y1="118" x2="320" y2="118" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red-bcnf1)"/>
  <defs>
    <marker id="arrow-red-bcnf1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
    </marker>
  </defs>
  <text x="400" y="235" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#b91c1c" text-anchor="middle">Advisor → Subject (Advisor is a determinant, but not a Candidate Key)</text>
  <text x="320" y="265" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Primary Key = (Student, Subject)</text>
</svg>
