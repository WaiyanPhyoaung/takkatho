<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#f8fafc" rx="8"/>
    
    <text x="400" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">DFS: Depth-First Search</text>
    
    <circle cx="400" cy="100" r="25" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2"/><text x="400" y="100" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">1</text>
    <circle cx="300" cy="180" r="25" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2"/><text x="300" y="180" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">2</text>
    <circle cx="200" cy="260" r="25" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2"/><text x="200" y="260" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">3</text>
    <circle cx="400" cy="260" r="25" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/><text x="400" y="260" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">4</text>
    <circle cx="500" cy="180" r="25" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/><text x="500" y="180" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">5</text>
    
    <line x1="385" y1="120" x2="315" y2="165" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)"/>
    <line x1="285" y1="200" x2="215" y2="245" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)"/>
    
    <path d="M 220 280 Q 260 320 300 210" stroke="#eab308" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <text x="260" y="300" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ca8a04" text-anchor="middle" dominant-baseline="middle">Backtrack!</text>
    
    <line x1="315" y1="195" x2="385" y2="245" stroke="#334155" stroke-width="2" />
    <line x1="415" y1="120" x2="485" y2="165" stroke="#334155" stroke-width="2" />
    
    <text x="400" y="350" font-family="system-ui, sans-serif" font-size="16" font-weight="normal" fill="#334155" text-anchor="middle" dominant-baseline="middle">Goes as deep as possible, then turns back.</text>

    </svg>