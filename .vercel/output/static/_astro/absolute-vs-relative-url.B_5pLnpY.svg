<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420">
  <rect width="720" height="420" fill="#1e1e2e"/>
  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-family="monospace" font-size="15" fill="#e2e8f0" font-weight="bold">Absolute URL vs Relative URL</text>

  <!-- LEFT: Absolute URL -->
  <rect x="30" y="48" width="320" height="280" rx="8" fill="#1a1a2e" stroke="#7c3aed" stroke-width="2"/>
  <text x="190" y="72" text-anchor="middle" font-family="monospace" font-size="13" fill="#a78bfa" font-weight="bold">Absolute URL</text>
  <text x="190" y="90" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">(လိပ်စာ အပြည့်အစုံ)</text>

  <!-- house icon (full address analogy) -->
  <text x="190" y="120" text-anchor="middle" font-family="monospace" font-size="28" fill="#7c3aed">🏠</text>
  <text x="190" y="148" text-anchor="middle" font-family="monospace" font-size="10" fill="#e2e8f0">အပြည့်အစုံတဲ့ လိပ်စာ</text>
  <text x="190" y="163" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">(နိုင်ငံ + မြို့ + လမ်း + အိမ်နံပါတ်)</text>

  <!-- code box -->
  <rect x="50" y="176" width="280" height="60" rx="5" fill="#2d2d3f" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="190" y="197" text-anchor="middle" font-family="monospace" font-size="11" fill="#a78bfa">&lt;a href="https://www.google.com/</text>
  <text x="190" y="212" text-anchor="middle" font-family="monospace" font-size="11" fill="#a78bfa">maps"&gt;Google Maps&lt;/a&gt;</text>
  <text x="190" y="227" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">domain + path အပြည့်အစုံ</text>

  <text x="190" y="260" text-anchor="middle" font-family="monospace" font-size="10" fill="#e2e8f0">ဘယ်ဖိုင်မှာမဆို သုံးလို့ရတယ်</text>
  <text x="190" y="276" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">ပြင်ပ website ချိတ်ရင် ဒါပဲသုံးပါ</text>
  <text x="190" y="292" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">https:// ဒါမှ http:// နဲ့ စရမယ်</text>
  <text x="190" y="310" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">example.com → အချိန်မရွေး ရောက်သွားနိုင်</text>

  <!-- RIGHT: Relative URL -->
  <rect x="370" y="48" width="320" height="280" rx="8" fill="#1a1a2e" stroke="#0ea5e9" stroke-width="2"/>
  <text x="530" y="72" text-anchor="middle" font-family="monospace" font-size="13" fill="#38bdf8" font-weight="bold">Relative URL</text>
  <text x="530" y="90" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">(ကိုယ့် Website ထဲမှာ)</text>

  <!-- navigation icon (directions analogy) -->
  <text x="530" y="120" text-anchor="middle" font-family="monospace" font-size="28" fill="#0ea5e9">🗺️</text>
  <text x="530" y="148" text-anchor="middle" font-family="monospace" font-size="10" fill="#e2e8f0">လက်ရှိနေရာကနေ ပြောတဲ့ ညွှန်ကြားချက်</text>
  <text x="530" y="163" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">("ဒီနေရာကနေ ညာကြောက်ပြီး ၂ ဘလောက်")</text>

  <!-- code box -->
  <rect x="390" y="176" width="280" height="60" rx="5" fill="#2d2d3f" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="530" y="197" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">&lt;a href="about.html"&gt;</text>
  <text x="530" y="212" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">ကျွန်တော်တို့အကြောင်း&lt;/a&gt;</text>
  <text x="530" y="227" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">ဖိုင်နာမည်ပဲ ထည့်တယ်</text>

  <text x="530" y="260" text-anchor="middle" font-family="monospace" font-size="10" fill="#e2e8f0">ကိုယ့် website ထဲမှာပဲ သုံးရတယ်</text>
  <text x="530" y="276" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">တူညီတဲ့ folder → about.html</text>
  <text x="530" y="292" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">folder ထဲ → pages/about.html</text>
  <text x="530" y="308" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">folder တစ်ဆင့်ပြန်ထွက် → ../about.html</text>

  <!-- Bottom tip -->
  <rect x="30" y="342" width="660" height="58" rx="6" fill="#2d2d3f" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="360" y="363" text-anchor="middle" font-family="monospace" font-size="12" fill="#e2e8f0" font-weight="bold">ဘယ်အချိန် ဘာသုံးမလဲ?</text>
  <text x="360" y="381" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">ပြင်ပ website (Google, Facebook) → Absolute URL | ကိုယ့် page တူညီ site ထဲ → Relative URL</text>
</svg>
