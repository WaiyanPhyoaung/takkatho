<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#f8fafc" rx="8"/>
    
    <text x="400" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">Binary Search Tree: Finding 27</text>
    
    <circle cx="400" cy="100" r="25" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/><text x="400" y="100" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">50</text>
    <line x1="385" y1="120" x2="300" y2="180" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)"/>
    <line x1="415" y1="120" x2="500" y2="180" stroke="#cbd5e1" stroke-width="2" />
    <text x="320" y="140" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ef4444" text-anchor="end" dominant-baseline="middle">27 &lt; 50 (Go Left)</text>
    
    <circle cx="280" cy="200" r="25" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/><text x="280" y="200" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">30</text>
    <circle cx="520" cy="200" r="25" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/><text x="520" y="200" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">70</text>
    
    <line x1="265" y1="220" x2="200" y2="280" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)"/>
    <line x1="295" y1="220" x2="360" y2="280" stroke="#cbd5e1" stroke-width="2" />
    <text x="200" y="240" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ef4444" text-anchor="end" dominant-baseline="middle">27 &lt; 30 (Go Left)</text>
    
    <circle cx="180" cy="300" r="25" fill="#dcfce3" stroke="#3b82f6" stroke-width="2"/><text x="180" y="300" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">27</text>
    <circle cx="380" cy="300" r="25" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/><text x="380" y="300" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">40</text>
    
    <text x="180" y="350" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#22c55e" text-anchor="middle" dominant-baseline="middle">Found it! O(log n)</text>

    </svg>