<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="monospace">
  <rect width="680" height="460" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="340" y="40" fill="#e2e8f0" font-size="20" font-weight="bold" text-anchor="middle">CSS Specificity — ဘယ် Rule အနိုင်ရမလဲ</text>
  <text x="340" y="66" fill="#94a3b8" font-size="13" text-anchor="middle">အလေးချိန် များတဲ့ Selector က အနိုင်ရတယ်</text>

  <!-- Four weight tiers -->
  <!-- Inline -->
  <rect x="40" y="95" width="140" height="110" rx="8" fill="#2d2d3f" stroke="#7c3aed" stroke-width="2"/>
  <text x="110" y="125" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">Inline</text>
  <text x="110" y="150" fill="#a78bfa" font-size="13" text-anchor="middle">style="..."</text>
  <text x="110" y="188" fill="#f472b6" font-size="26" font-weight="bold" text-anchor="middle">1000</text>

  <!-- ID -->
  <rect x="200" y="95" width="140" height="110" rx="8" fill="#2d2d3f" stroke="#7c3aed" stroke-width="2"/>
  <text x="270" y="125" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">ID</text>
  <text x="270" y="150" fill="#a78bfa" font-size="13" text-anchor="middle">#header</text>
  <text x="270" y="188" fill="#f472b6" font-size="26" font-weight="bold" text-anchor="middle">100</text>

  <!-- Class -->
  <rect x="360" y="95" width="140" height="110" rx="8" fill="#2d2d3f" stroke="#7c3aed" stroke-width="2"/>
  <text x="430" y="125" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">Class</text>
  <text x="430" y="150" fill="#a78bfa" font-size="13" text-anchor="middle">.btn  :hover</text>
  <text x="430" y="188" fill="#f472b6" font-size="26" font-weight="bold" text-anchor="middle">10</text>

  <!-- Element -->
  <rect x="520" y="95" width="140" height="110" rx="8" fill="#2d2d3f" stroke="#7c3aed" stroke-width="2"/>
  <text x="590" y="125" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">Element</text>
  <text x="590" y="150" fill="#a78bfa" font-size="13" text-anchor="middle">div  p  li</text>
  <text x="590" y="188" fill="#f472b6" font-size="26" font-weight="bold" text-anchor="middle">1</text>

  <!-- Arrow high to low -->
  <text x="60" y="235" fill="#94a3b8" font-size="12">အားကြီး ←</text>
  <text x="600" y="235" fill="#94a3b8" font-size="12" text-anchor="end">→ အားနည်း</text>

  <!-- Worked example -->
  <rect x="40" y="260" width="600" height="130" rx="8" fill="#252536" stroke="#475569" stroke-width="1"/>
  <text x="60" y="290" fill="#94a3b8" font-size="13">ဥပမာ တွက်ချက်ခြင်း —</text>
  <text x="60" y="322" fill="#7dd3fc" font-size="18" font-weight="bold">nav#main .links li</text>

  <text x="60" y="352" fill="#e2e8f0" font-size="13">#main (ID) = 100</text>
  <text x="230" y="352" fill="#e2e8f0" font-size="13">.links (Class) = 10</text>
  <text x="430" y="352" fill="#e2e8f0" font-size="13">nav + li (Element) = 2</text>
  <text x="60" y="378" fill="#f472b6" font-size="15" font-weight="bold">စုစုပေါင်း = 112</text>

  <!-- !important note -->
  <text x="340" y="428" fill="#fbbf24" font-size="13" text-anchor="middle">⚠️  !important က အားလုံးကို ကျော်ဖြတ်တယ် — သတိထားသုံးပါ</text>
</svg>
