<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#f8fafc" rx="8"/>
    
    <text x="400" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">Array vs Linked List in Memory</text>
    
    <text x="200" y="100" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle" dominant-baseline="middle">Array (Contiguous)</text>
    <rect x="100" y="130" width="50" height="50" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="4"/><text x="125" y="155" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">A</text><text x="125" y="195" font-family="system-ui, sans-serif" font-size="12" font-weight="normal" fill="#64748b" text-anchor="middle" dominant-baseline="middle">0</text><rect x="150" y="130" width="50" height="50" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="4"/><text x="175" y="155" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">B</text><text x="175" y="195" font-family="system-ui, sans-serif" font-size="12" font-weight="normal" fill="#64748b" text-anchor="middle" dominant-baseline="middle">1</text><rect x="200" y="130" width="50" height="50" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="4"/><text x="225" y="155" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">C</text><text x="225" y="195" font-family="system-ui, sans-serif" font-size="12" font-weight="normal" fill="#64748b" text-anchor="middle" dominant-baseline="middle">2</text><rect x="250" y="130" width="50" height="50" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="4"/><text x="275" y="155" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">D</text><text x="275" y="195" font-family="system-ui, sans-serif" font-size="12" font-weight="normal" fill="#64748b" text-anchor="middle" dominant-baseline="middle">3</text>
    
    <text x="600" y="100" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle" dominant-baseline="middle">Linked List (Scattered)</text>
    <rect x="500" y="130" width="50" height="50" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="4"/> <text x="525" y="155" font-family="system-ui, sans-serif" font-size="16" font-weight="normal" fill="#334155" text-anchor="middle" dominant-baseline="middle">A</text>
    <rect x="650" y="180" width="50" height="50" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="4"/> <text x="675" y="205" font-family="system-ui, sans-serif" font-size="16" font-weight="normal" fill="#334155" text-anchor="middle" dominant-baseline="middle">B</text>
    <rect x="480" y="250" width="50" height="50" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="4"/> <text x="505" y="275" font-family="system-ui, sans-serif" font-size="16" font-weight="normal" fill="#334155" text-anchor="middle" dominant-baseline="middle">C</text>
    
    <path d="M 550 155 C 600 155, 600 180, 650 190" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
