<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#f8fafc" rx="8"/>
    
    <text x="400" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">Queue (FIFO - First In, First Out)</text>
    
    <line x1="200" y1="150" x2="600" y2="150" stroke="#334155" stroke-width="4" />
    <line x1="200" y1="250" x2="600" y2="250" stroke="#334155" stroke-width="4" />
    
    <rect x="480" y="170" width="80" height="60" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2" rx="8"/> <text x="520" y="200" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1e3a8a" text-anchor="middle" dominant-baseline="middle">Person 1</text>
    <rect x="380" y="170" width="80" height="60" fill="#93c5fd" stroke="#2563eb" stroke-width="2" rx="8"/> <text x="420" y="200" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1e3a8a" text-anchor="middle" dominant-baseline="middle">Person 2</text>
    <rect x="280" y="170" width="80" height="60" fill="#60a5fa" stroke="#1d4ed8" stroke-width="2" rx="8"/> <text x="320" y="200" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1e3a8a" text-anchor="middle" dominant-baseline="middle">Person 3</text>
    
    <line x1="100" y1="200" x2="250" y2="200" stroke="#22c55e" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="150" y="180" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#22c55e" text-anchor="middle" dominant-baseline="middle">ENQUEUE</text>
    <text x="150" y="220" font-family="system-ui, sans-serif" font-size="14" font-weight="normal" fill="#22c55e" text-anchor="middle" dominant-baseline="middle">(Join Line)</text>
    
    <line x1="580" y1="200" x2="730" y2="200" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)"/>
    <text x="670" y="180" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ef4444" text-anchor="middle" dominant-baseline="middle">DEQUEUE</text>
    <text x="670" y="220" font-family="system-ui, sans-serif" font-size="14" font-weight="normal" fill="#ef4444" text-anchor="middle" dominant-baseline="middle">(Served)</text>

    </svg>