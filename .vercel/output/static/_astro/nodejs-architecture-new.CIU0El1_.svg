<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
      .box { fill: #f8f9fa; stroke: #343a40; stroke-width: 2; rx: 8; }
      .text-title { font-family: monospace; font-size: 18px; font-weight: bold; fill: #212529; text-anchor: middle; }
      .text-desc { font-family: monospace; font-size: 14px; fill: #495057; text-anchor: middle; }
      .arrow { stroke: #68a063; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .highlight { fill: #e8f5e9; stroke: #68a063; stroke-width: 2; rx: 8; }
      .v8 { fill: #fff3cd; stroke: #ffc107; stroke-width: 2; rx: 8; }
      .libuv { fill: #cce5ff; stroke: #004085; stroke-width: 2; rx: 8; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#68a063" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff" rx="8" />

  <rect x="100" y="50" width="600" height="80" class="highlight" />
  <text x="400" y="90" class="text-title">Node.js API (Javascript)</text>

  <line x1="400" y1="130" x2="400" y2="170" class="arrow" />

  <rect x="100" y="180" width="280" height="120" class="v8" />
  <text x="240" y="230" class="text-title">V8 Engine</text>
  <text x="240" y="260" class="text-desc">(Google's JS Engine)</text>

  <rect x="420" y="180" width="280" height="120" class="libuv" />
  <text x="560" y="230" class="text-title">Libuv</text>
  <text x="560" y="260" class="text-desc">(Event Loop / Async I/O)</text>
  
  <rect x="100" y="330" width="600" height="50" class="box" />
  <text x="400" y="360" class="text-title">Operating System (Kernel)</text>
</svg>