<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="100%" height="100%">
  <defs>
    <style>
      .bg     { fill: #1e1e2e; }
      .box    { fill: #2d2d3f; stroke: #4f46e5; stroke-width: 2; }
      .box-g  { fill: #2d2d3f; stroke: #10b981; stroke-width: 2; }
      .inner  { fill: #181825; }
      .t-main { font-family: sans-serif; font-size: 14px; text-anchor: middle; fill: #f8fafc; }
      .t-code { font-family: monospace; font-size: 13px; fill: #a5b4fc; }
      .t-res  { font-family: monospace; font-size: 13px; fill: #6ee7b7; }
      .t-fn   { font-family: monospace; font-size: 11px; text-anchor: middle; fill: #c4b5fd; }
      .t-lbl  { font-family: sans-serif; font-size: 11px; fill: #64748b; text-anchor: middle; }
      .arrow  { stroke: #4f46e5; stroke-width: 1.5; fill: none; }
    </style>
    <marker id="ah" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#4f46e5"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="400" y="26" class="t-main" font-size="18" font-weight="bold">String Methods — စာသား လုပ်ဆောင်ချက်များ</text>

  <!-- Original string -->
  <rect x="220" y="44" width="360" height="50" rx="8" class="box"/>
  <text x="400" y="65" class="t-main" fill="#c4b5fd">မူရင်း String</text>
  <rect x="235" y="72" width="330" height="18" rx="3" class="inner"/>
  <text x="250" y="85" class="t-code">"  Python Course  "</text>
  <text x="400" y="100" class="t-lbl">( ၂ ဘက်မှာ Space တွေ ရှိသည် )</text>

  <!-- strip() -->
  <line x1="320" y1="95" x2="120" y2="145" class="arrow" marker-end="url(#ah)"/>
  <text x="185" y="128" class="t-fn">.strip()</text>
  <rect x="30" y="148" width="190" height="60" rx="6" class="box-g"/>
  <text x="125" y="168" class="t-main" fill="#6ee7b7">.strip()</text>
  <text x="38" y="188" class="t-res">"Python Course"</text>
  <text x="125" y="202" class="t-lbl">Space ဖြတ်ပစ်</text>

  <!-- upper() -->
  <line x1="365" y1="95" x2="280" y2="145" class="arrow" marker-end="url(#ah)"/>
  <text x="302" y="128" class="t-fn">.upper()</text>
  <rect x="232" y="148" width="190" height="60" rx="6" class="box-g"/>
  <text x="327" y="168" class="t-main" fill="#6ee7b7">.upper()</text>
  <text x="240" y="188" class="t-res">"PYTHON COURSE"</text>
  <text x="327" y="202" class="t-lbl">အကြီးသို့ ပြောင်း</text>

  <!-- lower() -->
  <line x1="435" y1="95" x2="520" y2="145" class="arrow" marker-end="url(#ah)"/>
  <text x="462" y="128" class="t-fn">.lower()</text>
  <rect x="432" y="148" width="190" height="60" rx="6" class="box-g"/>
  <text x="527" y="168" class="t-main" fill="#6ee7b7">.lower()</text>
  <text x="440" y="188" class="t-res">"python course"</text>
  <text x="527" y="202" class="t-lbl">အသေးသို့ ပြောင်း</text>

  <!-- replace() -->
  <line x1="480" y1="95" x2="680" y2="145" class="arrow" marker-end="url(#ah)"/>
  <text x="620" y="128" class="t-fn">.replace()</text>
  <rect x="622" y="148" width="150" height="60" rx="6" class="box-g"/>
  <text x="697" y="168" class="t-main" fill="#6ee7b7">.replace()</text>
  <text x="630" y="188" class="t-res">"Python Class"</text>
  <text x="697" y="202" class="t-lbl">စကားလုံး အစား</text>

  <!-- Separator -->
  <line x1="30" y1="228" x2="770" y2="228" stroke="#2d2d3f" stroke-width="1"/>
  <text x="400" y="245" class="t-main" font-size="13" fill="#94a3b8">နောက်ထပ် အသုံးများသော Methods</text>

  <!-- Second row: split, join, find, count, startswith -->
  <!-- split -->
  <rect x="30" y="260" width="140" height="100" rx="6" class="box"/>
  <text x="100" y="280" class="t-main" font-size="12" fill="#a78bfa">.split()</text>
  <rect x="40" y="288" width="120" height="42" rx="3" class="inner"/>
  <text x="50" y="306" class="t-code" font-size="11">"a b c"</text>
  <text x="50" y="322" class="t-res" font-size="11">["a","b","c"]</text>
  <text x="100" y="354" class="t-lbl">Space တွင် ဖြတ်</text>

  <!-- join -->
  <rect x="185" y="260" width="140" height="100" rx="6" class="box"/>
  <text x="255" y="280" class="t-main" font-size="12" fill="#a78bfa">"-".join()</text>
  <rect x="195" y="288" width="120" height="42" rx="3" class="inner"/>
  <text x="205" y="306" class="t-code" font-size="11">["a","b","c"]</text>
  <text x="205" y="322" class="t-res" font-size="11">"a-b-c"</text>
  <text x="255" y="354" class="t-lbl">List ကို ပေါင်းစည်း</text>

  <!-- find -->
  <rect x="340" y="260" width="140" height="100" rx="6" class="box"/>
  <text x="410" y="280" class="t-main" font-size="12" fill="#a78bfa">.find()</text>
  <rect x="350" y="288" width="120" height="42" rx="3" class="inner"/>
  <text x="360" y="306" class="t-code" font-size="11">"Python".find</text>
  <text x="360" y="322" class="t-res" font-size="11">("th") → 2</text>
  <text x="410" y="354" class="t-lbl">Index ရှာ</text>

  <!-- count -->
  <rect x="495" y="260" width="140" height="100" rx="6" class="box"/>
  <text x="565" y="280" class="t-main" font-size="12" fill="#a78bfa">.count()</text>
  <rect x="505" y="288" width="120" height="42" rx="3" class="inner"/>
  <text x="515" y="306" class="t-code" font-size="11">"aabbaa".count</text>
  <text x="515" y="322" class="t-res" font-size="11">("a") → 4</text>
  <text x="565" y="354" class="t-lbl">ရေတွက်</text>

  <!-- startswith -->
  <rect x="650" y="260" width="140" height="100" rx="6" class="box"/>
  <text x="720" y="276" class="t-main" font-size="11" fill="#a78bfa">.startswith()</text>
  <rect x="660" y="288" width="120" height="42" rx="3" class="inner"/>
  <text x="670" y="306" class="t-code" font-size="11">"Python".starts</text>
  <text x="670" y="322" class="t-res" font-size="11">with("Py")→True</text>
  <text x="720" y="354" class="t-lbl">စစ်ဆေး</text>

  <!-- Footer note -->
  <rect x="30" y="376" width="740" height="28" rx="4" class="inner"/>
  <text x="400" y="394" class="t-fn" text-anchor="middle" fill="#64748b">မူရင်း String ကို Methods တွေ မပြင်ဘဲ  အသစ်တစ်ခု ပြန်ပေးသည် — original = "Python", original.upper() → "PYTHON", original ကတော့ "Python" ပဲ ကျန်နေသည်</text>
</svg>
