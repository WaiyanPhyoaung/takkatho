<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#f8fafc" rx="8"/>
    
    <text x="400" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">Directed vs Undirected Graph</text>
    
    <text x="200" y="100" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle" dominant-baseline="middle">Undirected (Two-way)</text>
    <circle cx="150" cy="180" r="25" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/><text x="150" y="180" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">A</text>
    <circle cx="250" cy="180" r="25" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/><text x="250" y="180" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">B</text>
    <circle cx="200" cy="280" r="25" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/><text x="200" y="280" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">C</text>
    <line x1="175" y1="180" x2="225" y2="180" stroke="#334155" stroke-width="2" />
    <line x1="165" y1="200" x2="185" y2="260" stroke="#334155" stroke-width="2" />
    <line x1="235" y1="200" x2="215" y2="260" stroke="#334155" stroke-width="2" />
    <text x="200" y="330" font-family="system-ui, sans-serif" font-size="14" font-weight="normal" fill="#64748b" text-anchor="middle" dominant-baseline="middle">e.g., Facebook Friends</text>
    
    <text x="600" y="100" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle" dominant-baseline="middle">Directed (One-way)</text>
    <circle cx="550" cy="180" r="25" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/><text x="550" y="180" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">X</text>
    <circle cx="650" cy="180" r="25" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/><text x="650" y="180" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">Y</text>
    <circle cx="600" cy="280" r="25" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/><text x="600" y="280" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle" dominant-baseline="middle">Z</text>
    <line x1="575" y1="180" x2="625" y2="180" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <line x1="565" y1="200" x2="585" y2="260" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <line x1="615" y1="260" x2="635" y2="200" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="600" y="330" font-family="system-ui, sans-serif" font-size="14" font-weight="normal" fill="#64748b" text-anchor="middle" dominant-baseline="middle">e.g., Twitter Followers</text>

    </svg>